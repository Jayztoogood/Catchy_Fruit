<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catchy Fruit | My Website</title>
    <style>
        /* Modern Gaming Theme */
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 40px 10px;
        }
        h1 {
            color: #ff4d6d;
            font-size: 3rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .game-card {
            background: #1a1c23;
            padding: 15px;
            border-radius: 20px;
            border: 2px solid #ff4d6d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: inline-block;
            margin-top: 20px;
        }
        /* The iFrame must use /embed at the end to work */
        iframe {
            border: none;
            border-radius: 10px;
            background: #000;
        }
        .controls {
            margin-top: 25px;
            background: #252833;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
        }
        b { color: #ff4d6d; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Catchy Fruit</h1>
        <p>Don't let the fruit hit the ground!</p>

        <div class="game-card">
            <!-- FIXED LINK: Added /embed and sandbox permissions -->
            <iframe 
                src="https://studio.code.org" 
                width="400" 
                height="450" 
                scrolling="no" 
                allow="autoplay; fullscreen"
                sandbox="allow-forms allow-popups allow-scripts allow-same-origin">
            </iframe>
        </div>

        <div class="controls">
            <p>Use <b>Arrow Keys</b> to move.<br>
            <i>Note: If it won't move, click the game box first!</i></p>
        </div>
    </div>

</body>
</html>
