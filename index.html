<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catchy Fruit | Game Launcher</title>
    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 100px 20px;
        }
        .game-card {
            background: #1a1c23;
            padding: 40px;
            border-radius: 30px;
            border: 3px solid #ff4d6d;
            display: inline-block;
            box-shadow: 0 10px 50px rgba(255, 77, 109, 0.2);
        }
        h1 { color: #ff4d6d; font-size: 3.5rem; margin: 0; }
        p { font-size: 1.2rem; color: #a0a0a0; margin-bottom: 30px; }
        
        .play-button {
            background-color: #ff4d6d;
            color: white;
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: 0.3s;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }
        .play-button:hover {
            background-color: #ff758c;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="game-card">
        <h1>CATCHY FRUIT</h1>
        <p>Ready to play?</p>
        
        <!-- This opens your game in a full new tab to bypass the block -->
        <a href="https://studio.code.org" 
           target="_blank" 
           class="play-button">
           PLAY NOW
        </a>
    </div>

</body>
</html>
