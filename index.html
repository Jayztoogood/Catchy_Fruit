<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catchy Fruit | Play On Site</title>
    <style>
        /* Gaming Dark Mode Theme */
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 40px 10px;
        }

        h1 { color: #ff4d6d; font-size: 2.5rem; margin-bottom: 20px; }

        /* Container that holds and centers your game */
        .game-frame-container {
            background: #1a1c23;
            padding: 15px;
            border-radius: 20px;
            border: 3px solid #ff4d6d;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* This is the window showing your game */
        iframe {
            display: block;
            margin: 0 auto;
            border: none;
            border-radius: 10px;
            background: #000;
        }

        .controls-hint { margin-top: 20px; color: #a0a0a0; }
        b { color: #ff4d6d; }
    </style>
</head>
<body>

    <h1>CATCHY FRUIT</h1>

    <div class="game-frame-container">
        <!-- THE FIXED EMBED LINK -->
        <iframe 
            width="440" 
            height="757" 
            src="https://studio.code.org" 
            scrolling="no" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="controls-hint">
        <p>Use <b>Arrow Keys</b> to catch the fruit!</p>
        <p><i>Click inside the game box if it doesn't move.</i></p>
    </div>

</body>
</html>
