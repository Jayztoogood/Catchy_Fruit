<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catchy Fruit | Game Launcher</title>
    <style>
        /* This makes the website look like a professional gaming page */
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 100px 20px;
            margin: 0;
        }
        .game-card {
            background: #1a1c23;
            padding: 50px;
            border-radius: 30px;
            border: 3px solid #ff4d6d;
            display: inline-block;
            box-shadow: 0 10px 50px rgba(255, 77, 109, 0.3);
        }
        h1 { 
            color: #ff4d6d; 
            font-size: 3.5rem; 
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        p { 
            font-size: 1.2rem; 
            color: #a0a0a0; 
            margin-bottom: 40px; 
        }
        
        /* This is your PLAY NOW button */
        .play-button {
            background-color: #ff4d6d;
            color: white;
            padding: 22px 60px;
            font-size: 1.8rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 5px 20px rgba(255, 77, 109, 0.4);
            cursor: pointer;
        }

        /* Makes the button glow and grow when you hover over it */
        .play-button:hover {
            background-color: #ff758c;
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.6);
        }
    </style>
</head>
<body>

    <div class="game-card">
        <h1>CATCHY FRUIT</h1>
        <p>Ready to play your game on Code.org?</p>
        
        <!-- THIS IS THE MAGIC PART: It brings you straight to your game -->
        <a href="https://studio.code.org" 
           class="play-button">
           PLAY NOW
        </a>
    </div>

</body>
</html>
