<!DOCTYPE html>
<html>
<head>
    <title>Catchy Fruit Game</title>
    <style>
        body {
            background-color: #1a1a2e; /* Dark blue background */
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 40px;
        }
        h1 {
            color: #e94560; /* Pink/Red title */
            font-size: 3rem;
            margin-bottom: 20px;
        }
        iframe {
            border: 8px solid #0f3460;
            border-radius: 15px;
            box-shadow: 0px 0px 30px rgba(0,0,0,0.7);
            background-color: white; /* Shows while loading */
        }
        .instructions {
            margin-top: 30px;
            background: #16213e;
            padding: 20px;
            display: inline-block;
            border-radius: 12px;
            border: 1px solid #0f3460;
        }
    </style>
</head>
<body>

    <h1>Catchy Fruit!</h1>

    <!-- This is your specific game link -->
    <iframe 
        src="https://studio.code.org" 
        width="400" 
        height="450" 
        frameborder="0" 
        scrolling="no">
    </iframe>

    <div class="instructions">
        <h2>How to Play</h2>
        <p>Use the <b>Arrow Keys</b> to catch the falling fruit!</p>
        <p>Don't let them hit the ground!</p>
    </div>

</body>
</html>
