<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catchy Fruit | My Game</title>
    <style>
        /* This makes your website look like a real gaming page */
        body {
            background-color: #1a1a2e; /* Dark theme */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 50px 20px;
        }

        h1 {
            color: #e94560; /* Neon red title */
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px #0f3460;
        }

        .game-wrapper {
            margin: 30px auto;
            display: inline-block;
            position: relative;
            padding: 10px;
            background: #0f3460;
            border-radius: 20px;
            box-shadow: 0px 0px 40px rgba(0, 0, 0, 0.8);
        }

        /* The actual game box */
        iframe {
            border: none;
            border-radius: 10px;
            background-color: #000;
        }

        .instructions {
            margin-top: 30px;
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            max-width: 400px;
            border: 1px solid #e94560;
        }

        b { color: #e94560; }
    </style>
</head>
<body>

    <h1>CATCHY FRUIT</h1>
    <p>Can you catch them all?</p>

    <div class="game-wrapper">
        <!-- This embeds your specific Code.org game directly -->
        <iframe 
            src="https://studio.code.org" 
            width="400" 
            height="450" 
            scrolling="no">
        </iframe>
    </div>

    <div class="instructions">
        <h3>How to Play</h3>
        <p>Use your <b>Left</b> and <b>Right Arrow Keys</b> to move the basket. Catch the falling fruit to increase your score!</p>
    </div>

</body>
</html>
