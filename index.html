<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catchy Fruit | Play Now</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 50px 20px;
        }
        h1 {
            color: #e94560;
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px #0f3460;
        }
        .game-container {
            margin: 30px auto;
            display: inline-block;
            background: #0f3460;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0px 0px 40px rgba(0, 0, 0, 0.8);
        }
        /* This ID matches your specific game and allows it to be embedded */
        iframe {
            border: none;
            border-radius: 10px;
            background-color: #fff;
        }
        .instructions {
            margin-top: 30px;
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            max-width: 450px;
            border: 1px solid #e94560;
        }
        b { color: #e94560; }
    </style>
</head>
<body>

    <h1>CATCHY FRUIT</h1>
    <p>Catch the fruit before it hits the ground!</p>

    <div class="game-container">
        <!-- FIXED EMBED LINK BELOW -->
        <iframe 
            src="https://studio.code.org" 
            width="400" 
            height="450" 
            scrolling="no" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="instructions">
        <h3>How to Play</h3>
        <p>Use your <b>Arrow Keys</b> to move. If the game doesn't respond, click inside the game box first!</p>
    </div>

</body>
</html>
