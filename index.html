<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catchy Fruit | Play Now</title>
    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 40px 10px;
        }
        h1 { color: #ff4d6d; font-size: 2.5rem; margin-bottom: 20px; }
        
        /* This container makes the game look like it's part of the site */
        .game-box {
            background: #1a1c23;
            padding: 15px;
            border-radius: 20px;
            border: 3px solid #ff4d6d;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        iframe {
            border: none;
            border-radius: 10px;
            background: #000;
        }

        .hint { margin-top: 20px; color: #a0a0a0; }
    </style>
</head>
<body>

    <h1>CATCHY FRUIT</h1>

    <div class="game-box">
        <!-- FIXED: Added /embed?nosource to make it playable here -->
        <iframe 
            src="https://studio.code.org" 
            width="400" 
            height="450" 
            scrolling="no"
            allowfullscreen>
        </iframe>
    </div>

    <div class="hint">
        <p>Use <b>Arrow Keys</b> to play.<br>
        <i>(Click inside the game box if it doesn't move!)</i></p>
    </div>

</body>
</html>
